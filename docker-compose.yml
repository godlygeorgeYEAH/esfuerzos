version: "3.9"
services:
  reune-api:
    build: .
    container_name: reune-ve-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    mem_limit: 2g
    env_file:
      - .env
    volumes:
      - .:/app
      - insightface_cache:/root/.insightface
      - huggingface_cache:/root/.cache/huggingface
      - /root/sos_images:/root/sos_images:ro
      - /root/crisis_images:/root/crisis_images:ro
      - /root/reconexion_images:/root/reconexion_images:ro
      - /root/venezreporta_images:/root/venezreporta_images:ro
      - app_data:/app/data
    networks:
      - default
      - reune_waha

  # WAHA WhatsApp removed at the WhatsApp->Telegram cutover (2026-06-29). The intake
  # channel is now Telegram (telegram_intake.py, long-polling). The reune_waha
  # network is kept (external) so this compose stays valid; no WAHA container runs.

volumes:
  insightface_cache:
  huggingface_cache:
  app_data:

networks:
  reune_waha:
    external: true
    name: reune_default
