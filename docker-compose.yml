services:
  reune-api:
    build: .
    container_name: reune-ve-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    mem_limit: 2g
    env_file:
      - .env
    volumes:
      - .:/app
      - insightface_cache:/root/.insightface
      - huggingface_cache:/root/.cache/huggingface
      - /root/sos_images:/root/sos_images:ro
      - /root/crisis_images:/root/crisis_images:ro
      - /root/reconexion_images:/root/reconexion_images:ro
      - /root/venezreporta_images:/root/venezreporta_images:ro
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - reune_waha

  # ──────────────────────────────────────────────────────────────────────────
  # Postgres local — estado conversacional del bot (FASE 0).
  # NO es Supabase: aquí vive el hot-path por-mensaje (conversaciones, mensajes,
  # eventos, clientes, flow_nodes, bot_config) para sacar ese tráfico de Supabase
  # y darle durabilidad ante reinicios vía el named volume pg_data.
  # Supabase sigue recibiendo SOLO las salidas compartidas (reports, matches...).
  # ──────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: reune-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reune}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reune}
      POSTGRES_DB: ${POSTGRES_DB:-reune}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/pg_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reune} -d ${POSTGRES_DB:-reune}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Misma key que usa la API (reune-api) desde el mismo .env, para que las
      # llamadas salientes (sendList/sendText/contacts) no reciban 401.
      WAHA_API_KEY: ${WAHA_API_KEY:-}
    volumes:
      - waha_data:/app/.sessions
    networks:
      - reune_waha

volumes:
  insightface_cache:
  huggingface_cache:
  app_data:
  waha_data:
  pg_data:        # FASE 0 — estado conversacional durable (sobrevive reinicios)

networks:
  reune_waha:
    external: true
    name: reune_default
