name: Deploy Reune VE API to VPS

# Despliegue al VPS por SSH: git pull + docker compose build/up + health check.
#
# Dos formas de disparar:
#  1. push -> tocando el archivo `deploy.trigger` en esta rama (lo usa el asistente).
#  2. workflow_dispatch -> manual desde la UI de GitHub (requiere estar en la rama
#     por defecto). Los inputs son opcionales; si no se dan, usa el secret y los
#     valores por defecto.
#
# La clave SSH NUNCA va en el repo: se lee del secret cifrado VPS_SSH_PASSWORD.
on:
  workflow_dispatch:
    inputs:
      ssh_host:
        description: 'Host/IP del VPS (opcional)'
        required: false
        default: '13.140.166.72'
      ssh_user:
        description: 'Usuario SSH (opcional)'
        required: false
        default: 'root'
      ssh_password:
        description: 'Clave SSH (opcional; si se omite usa el secret VPS_SSH_PASSWORD)'
        required: false
      deploy_path:
        description: 'Directorio de despliegue en el VPS (opcional)'
        required: false
        default: '/root/reune'
  push:
    branches:
      - claude/vps-deployment-setup-7g27ty
    paths:
      - deploy.trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSHPASS: ${{ inputs.ssh_password || secrets.VPS_SSH_PASSWORD }}
      SSH_HOST: ${{ inputs.ssh_host || '13.140.166.72' }}
      SSH_USER: ${{ inputs.ssh_user || 'root' }}
      DEPLOY_PATH: ${{ inputs.deploy_path || '/root/reune' }}
    steps:
      - name: Verificar credencial
        run: |
          if [ -z "$SSHPASS" ]; then
            echo "::error::No hay clave SSH. Define el secret VPS_SSH_PASSWORD (Settings -> Secrets and variables -> Actions) o pásala como input."
            exit 1
          fi

      - name: Instalar sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Desplegar por SSH
        run: |
          echo "::add-mask::$SSHPASS"
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            "${SSH_USER}@${SSH_HOST}" \
            "set -e; cd '${DEPLOY_PATH}'; echo '===== GIT PULL ====='; git pull origin main; echo '===== DOCKER BUILD ====='; docker compose build reune-ve-api; echo '===== DOCKER UP ====='; docker compose up -d; echo '===== HEALTH CHECK ====='; sleep 3; curl -s -w '\nHTTP_CODE:%{http_code}\n' http://localhost:8080/health"
