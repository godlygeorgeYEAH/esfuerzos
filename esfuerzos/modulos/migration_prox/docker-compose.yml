services:

  # ----------------------------------------------------------------
  # Bot Reúne — FastAPI
  # ----------------------------------------------------------------
  bot:
    build: .
    container_name: reune_bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/reune.db
      WAHA_URL: http://waha:3000
      WAHA_WEBHOOK_URL: http://bot:8000/webhook/waha
      WAHA_FREE_TIER: "true"
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET:-}
      PHOTO_STORAGE_PATH: /data/photos
      PHOTO_MAX_COUNT: ${PHOTO_MAX_COUNT:-5}
      PHOTO_TTL_SECONDS: ${PHOTO_TTL_SECONDS:-60}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - reune_data:/data
    depends_on:
      - waha
    networks:
      - reune_net

  # ----------------------------------------------------------------
  # WAHA — WhatsApp HTTP API (free tier, una sesión)
  # ----------------------------------------------------------------
  waha:
    image: devlikeapro/waha
    container_name: reune_waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      # Envía todos los eventos de mensaje al bot
      WHATSAPP_HOOK_URL: http://bot:8000/webhook/waha
      WHATSAPP_HOOK_EVENTS: message,message.any
    volumes:
      - waha_sessions:/app/.wwebjs_auth
      - waha_media:/app/.media
    networks:
      - reune_net

volumes:
  reune_data:
  waha_sessions:
  waha_media:

networks:
  reune_net:
    driver: bridge
